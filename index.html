
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#059669">
    <title>SI-TIDUR · Puskesmas Gemarang</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #059669; --bg: #f3f4f6; --card-bg: #ffffff; --text-main: #1f2937; --text-sub: #6b7280; --danger: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 50px; user-select: none; }
        .container { max-width: 480px; margin: 0 auto; background: #fafafa; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { background-image: url('image_fd50e8.jpg'); background-size: cover; background-position: center; color: white; padding: 40px 20px 60px; border-bottom-left-radius: 28px; border-bottom-right-radius: 28px; position: sticky; top: 0; z-index: 50; box-shadow: 0 8px 20px rgba(0,0,0,0.2); background-blend-mode: multiply; background-color: rgba(0,0,0,0.2); }
        .header h1 { margin: 0; font-size: 18px; font-weight: 800; text-transform: uppercase; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        .stats-container { display: flex; gap: 10px; padding: 0 20px; margin-top: -25px; position: relative; z-index: 60; }
        .stat-card { flex: 1; background: var(--card-bg); padding: 15px 10px; border-radius: 16px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-val { font-size: 24px; font-weight: 800; display: block; }
        .stat-label { font-size: 10px; color: var(--text-sub); text-transform: uppercase; font-weight: 700; }
        .room-card { background: var(--card-bg); margin: 16px 20px; border-radius: 16px; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); }
        .room-header { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; display: flex; justify-content: space-between; font-weight: 800; }
        .bed-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .bed-chip { padding: 12px; border-radius: 12px; text-align: center; border: 1.5px solid transparent; }
        .bed-chip.available { background: #d1fae5; color: #064e3b; border-color: #a7f3d0; }
        .bed-chip.occupied { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .fab-container { position: fixed; bottom: 24px; right: 24px; z-index: 100; }
        .fab { background: var(--text-main); color: white; width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .view { display: none; } .view.active { display: block; }
        #error-msg { display: none; text-align: center; padding: 40px 20px; color: var(--danger); font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div id="view-home" class="view active">
            <header class="header">
                <h1>🏥 PUSKESMAS GEMARANG</h1>
                <div style="font-size:10px; font-weight:700; margin-top:5px; opacity:0.9"><i class="fas fa-circle" style="color:#4ade80; font-size:8px"></i> MONITORING REAL-TIME</div>
            </header>
            <div class="stats-container">
                <div class="stat-card"><span class="stat-val" id="total-beds">0</span><span class="stat-label">Total</span></div>
                <div class="stat-card"><span class="stat-val" style="color:var(--primary)" id="avail-beds">0</span><span class="stat-label">Kosong</span></div>
                <div class="stat-card"><span class="stat-val" style="color:var(--danger)" id="occ-beds">0</span><span class="stat-label">Terisi</span></div>
            </div>
            <div style="text-align:center; margin-top:15px;"><span id="last-update" style="font-size:11px; color:var(--text-sub); background:#e5e7eb; padding:5px 12px; border-radius:20px;">Menghubungkan...</span></div>
            <div id="error-msg"><i class="fas fa-exclamation-triangle"></i><br>Koneksi Terganggu.<br><small>Sistem gagal menarik data JSONP.</small></div>
            <div id="room-container"></div>
            <div class="fab-container"><button class="fab" onclick="app.sync()"><i class="fas fa-sync-alt"></i></button></div>
        </div>
    </div>

    <script>
    const CONFIG = {
        // LINK SUDAH DIPASTIKAN BENAR SESUAI FOTO
        sheetUrl: 'https://script.google.com/macros/s/AKfycbzJH3MaeyHq2VEIXBQIaGYzFzCsxLiW8V_NZOdb-raqY0RAn9h9GCRlEon1nYgBoWgVTQ/exec',
        rooms: [
            {id:'edelweis', name:'Edelweis', type:'Dewasa', beds:[1,2]},
            {id:'mawar', name:'Mawar', type:'Dewasa', beds:[1,2]},
            {id:'sakura', name:'Sakura', type:'Dewasa', beds:[1,2]},
            {id:'tulip', name:'Tulip', type:'Dewasa', beds:[1,2]},
            {id:'bougenv', name:'Bougenville', type:'Anak', beds:[1]},
            {id:'anggrek', name:'Anggrek', type:'VIP', beds:[1]}
        ]
    };

    const app = {
        beds: {},
        sync: function() {
            document.querySelector('.fab i').classList.add('fa-spin');
            const callbackName = 'jsonp_' + Date.now();
            const script = document.createElement('script');
            // Menambahkan parameter waktu agar menembus cache
            script.src = `${CONFIG.sheetUrl}?action=getAll&callback=${callbackName}&_t=${Date.now()}`;
            
            window[callbackName] = (data) => {
                document.querySelector('.fab i').classList.remove('fa-spin');
                document.getElementById('error-msg').style.display = 'none';
                if(data && data.beds) {
                    data.beds.forEach(b => { this.beds[`${b.room_id}-${b.bed_num}`] = b.status; });
                    this.render();
                    document.getElementById('last-update').innerText = 'Update: ' + data.last_updated;
                }
                delete window[callbackName];
                script.remove();
            };

            script.onerror = () => {
                document.querySelector('.fab i').classList.remove('fa-spin');
                document.getElementById('error-msg').style.display = 'block';
            };
            document.body.appendChild(script);
        },
        render: function() {
            let html = '', total=0, avail=0, occ=0;
            CONFIG.rooms.forEach(r => {
                let bedHtml = '';
                r.beds.forEach(b => {
                    total++;
                    const st = this.beds[`${r.id}-${b}`] || 'available';
                    st === 'available' ? avail++ : occ++;
                    // Sesuaikan dengan data yang keluar dari Apps Script Mas ("occupied" atau "available")
                    const label = (st === 'occupied' || st === 'Terisi') ? 'TERISI' : 'KOSONG';
                    const cssClass = (st === 'occupied' || st === 'Terisi') ? 'occupied' : 'available';
                    bedHtml += `<div class="bed-chip ${cssClass}"><b>BED ${b}</b><br><small>${label}</small></div>`;
                });
                html += `<div class="room-card"><div class="room-header"><span>${r.name}</span><small style="color:var(--text-sub)">${r.type}</small></div><div class="bed-grid">${bedHtml}</div></div>`;
            });
            document.getElementById('room-container').innerHTML = html;
            document.getElementById('total-beds').innerText = total;
            document.getElementById('avail-beds').innerText = avail;
            document.getElementById('occ-beds').innerText = occ;
        }
    };
    window.onload = () => app.sync();
    </script>
</body>
</html>
